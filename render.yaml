services:
  - type: web
    name: neon-worm-arena
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20.20.2
      - key: MAX_PLAYERS
        value: 15
      - key: MAP_SIZE
        value: 5200
