<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Slither Live Compact</title><style>
*{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden;font-family:system-ui,Arial;background:#06111f;color:white}canvas{display:block;width:100vw;height:100vh;background:radial-gradient(circle at 50% 45%,#12284a,#050914 70%)}
#menu{position:fixed;inset:0;display:grid;place-items:center;background:linear-gradient(135deg,#07101e,#101b3c 45%,#10091f);z-index:5}.card{width:min(460px,92vw);padding:24px;border:1px solid #ffffff24;border-radius:26px;background:#ffffff12;backdrop-filter:blur(18px);box-shadow:0 24px 70px #0009}.title{font-size:40px;font-weight:900;line-height:.95}.sub{opacity:.8;margin:10px 0 18px}input,button,select{width:100%;padding:14px 16px;border:0;border-radius:16px;margin:7px 0;font-size:16px}button{background:linear-gradient(135deg,#42f5c8,#7c5cff);color:#06111f;font-weight:900}.skins{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:12px 0}.skin{height:42px;border-radius:14px;border:2px solid transparent}.skin.on{border-color:white;box-shadow:0 0 18px #fff8}.rooms{font-size:14px;background:#0004;border-radius:16px;padding:10px;margin:10px 0;max-height:100px;overflow:auto}.hud{position:fixed;top:10px;left:10px;right:10px;display:flex;justify-content:space-between;gap:10px;pointer-events:none}.pill{background:#0009;border:1px solid #ffffff25;border-radius:999px;padding:9px 12px;font-weight:800;box-shadow:0 8px 30px #0006}.board{position:fixed;right:10px;top:60px;background:#0008;border:1px solid #ffffff25;border-radius:18px;padding:10px;min-width:160px;font-size:13px}.board b{display:block;margin-bottom:4px}.joy{position:fixed;left:22px;bottom:24px;width:130px;height:130px;border-radius:50%;background:#ffffff18;border:1px solid #fff3;touch-action:none}.knob{position:absolute;left:43px;top:43px;width:44px;height:44px;border-radius:50%;background:#fff9}.boost{position:fixed;right:24px;bottom:38px;width:92px;height:92px;border-radius:50%;border:0;background:linear-gradient(135deg,#ffdd44,#ff477e);font-weight:1000;color:#1a0710;box-shadow:0 12px 30px #0008}.dead{position:fixed;inset:0;display:none;place-items:center;background:#0009;z-index:4}.dead .card{text-align:center}.hide{display:none!important}@media(min-width:800px){.joy,.boost{opacity:.75}.title{font-size:54px}}
</style></head><body><canvas id="c"></canvas><div class="hud"><div class="pill" id="room">Server 0/15</div><div class="pill" id="score">Score 0</div></div><div class="board" id="board"><b>Leaderboard</b></div><div class="joy" id="joy"><div class="knob" id="knob"></div></div><button class="boost" id="boost">BOOST</button><div class="dead" id="dead"><div class="card"><div class="title">You crashed</div><p class="sub">Your food drops for the swarm. Rejoin the arena.</p><button onclick="location.reload()">Play Again</button></div></div><div id="menu"><div class="card"><div class="title">Slither Live</div><div class="sub">Compact HTML multiplayer • auto servers • 15 players max</div><input id="name" maxlength="16" placeholder="Worm name" value="Player"><div class="skins" id="skins"></div><div class="rooms" id="rooms">Loading servers...</div><button id="play">JOIN AVAILABLE SERVER</button><div class="sub">Controls: joystick/touch, mouse, or arrow keys. Hold boost to swarm and trap players.</div></div></div><script>
const cvs=c,ctx=cvs.getContext('2d'),S=['neon','sunset','ocean','toxic','candy','royal','fire','ice'],COL={neon:['#42f5c8','#7c5cff'],sunset:['#ffb347','#ff477e'],ocean:['#3fd7ff','#2667ff'],toxic:['#c8ff30','#00d47e'],candy:['#ff8bd1','#8cf7ff'],royal:['#f6d365','#7b2ff7'],fire:['#ffcf33','#ff2d2d'],ice:['#dff8ff','#4bd2ff']};let skin='neon',me=null,roomId=null,state=null,angle=0,boosting=false,cam={x:0,y:0},keys={};
function fit(){cvs.width=innerWidth*devicePixelRatio;cvs.height=innerHeight*devicePixelRatio;ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0)}addEventListener('resize',fit);fit();
skins.innerHTML=S.map(s=>`<button class="skin ${s==skin?'on':''}" data-s="${s}" style="background:linear-gradient(135deg,${COL[s][0]},${COL[s][1]})"></button>`).join('');skins.onclick=e=>{if(e.target.dataset.s){skin=e.target.dataset.s;[...skins.children].forEach(x=>x.classList.toggle('on',x.dataset.s==skin))}};
async function api(p,o){let r=await fetch(p,o?{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(o)}:{});return r.json()}
async function refreshRooms(){let r=await api('/api/rooms');rooms.innerHTML=(r.length?r:[{name:'No server yet',players:0,cap:15}]).map(x=>`${x.name}: <b>${x.players}/${x.cap}</b>`).join('<br>')}refreshRooms();setInterval(refreshRooms,2500);
play.onclick=async()=>{let j=await api('/api/join',{name:name.value||'Player',skin});me=j.playerId;roomId=j.roomId;menu.classList.add('hide');loopNet();};
async function loopNet(){if(!me)return;try{await api('/api/input',{playerId:me,roomId,angle,boost:boosting});let s=await api(`/api/state?room=${roomId}&player=${me}`);if(s.dead){dead.style.display='grid';return}state=s;let p=s.players.find(x=>x.id==me);if(p){cam.x+=(p.x-cam.x)*.18;cam.y+=(p.y-cam.y)*.18;score.textContent='Score '+p.score}room.textContent=`${s.room.name} ${s.room.players}/${s.room.cap}`;board.innerHTML='<b>Leaderboard</b>'+s.board.map((b,i)=>`<div>${i+1}. ${b.n} ${b.s}</div>`).join('')}catch(e){}setTimeout(loopNet,55)}
function world(x,y){return {x:x-cvs.clientWidth/2+cam.x,y:y-cvs.clientHeight/2+cam.y}}addEventListener('mousemove',e=>{if(!me)return;let w=world(e.clientX,e.clientY);angle=Math.atan2(w.y-cam.y,w.x-cam.x)});addEventListener('keydown',e=>{keys[e.key]=1;if(e.key===' ')boosting=true});addEventListener('keyup',e=>{keys[e.key]=0;if(e.key===' ')boosting=false});boost.onpointerdown=()=>boosting=true;boost.onpointerup=boost.onpointercancel=()=>boosting=false;
let joyActive=false,jcx=0,jcy=0;joy.onpointerdown=e=>{joyActive=true;joy.setPointerCapture(e.pointerId);let r=joy.getBoundingClientRect();jcx=r.left+r.width/2;jcy=r.top+r.height/2;moveJoy(e)};joy.onpointermove=e=>joyActive&&moveJoy(e);joy.onpointerup=joy.onpointercancel=()=>{joyActive=false;knob.style.left='43px';knob.style.top='43px'};function moveJoy(e){let dx=e.clientX-jcx,dy=e.clientY-jcy,d=Math.hypot(dx,dy)||1,m=Math.min(44,d);knob.style.left=43+dx/d*m+'px';knob.style.top=43+dy/d*m+'px';angle=Math.atan2(dy,dx)}
function draw(){requestAnimationFrame(draw);ctx.clearRect(0,0,cvs.clientWidth,cvs.clientHeight);ctx.save();ctx.translate(cvs.clientWidth/2-cam.x,cvs.clientHeight/2-cam.y);grid();if(state){for(const f of state.food){ctx.fillStyle=`hsl(${f.c} 95% 65%)`;ctx.beginPath();ctx.arc(f.x,f.y,4+f.v*2,0,7);ctx.fill()}for(const p of state.players)worm(p)}}ctx.restore();if(keys.ArrowLeft)angle-=.08;if(keys.ArrowRight)angle+=.08;if(keys.ArrowUp||keys.w)boosting=true}draw();
function grid(){ctx.strokeStyle='#ffffff0c';ctx.lineWidth=1;for(let x=-2100;x<=2100;x+=140){ctx.beginPath();ctx.moveTo(x,-2100);ctx.lineTo(x,2100);ctx.stroke()}for(let y=-2100;y<=2100;y+=140){ctx.beginPath();ctx.moveTo(-2100,y);ctx.lineTo(2100,y);ctx.stroke()}ctx.strokeStyle='#ff477e88';ctx.lineWidth=8;ctx.strokeRect(-2100,-2100,4200,4200)}
function worm(p){let co=COL[p.s]||COL.neon;for(let i=p.b.length-1;i>=0;i--){let q=p.b[i],r=Math.max(7,17-i*.06);let g=ctx.createRadialGradient(q.x,q.y,2,q.x,q.y,r);g.addColorStop(0,co[0]);g.addColorStop(1,co[1]);ctx.fillStyle=g;ctx.beginPath();ctx.arc(q.x,q.y,r,0,7);ctx.fill()}ctx.fillStyle='#fff';ctx.font='700 14px system-ui';ctx.textAlign='center';ctx.fillText(p.n,p.x,p.y-25);ctx.fillStyle='#06111f';ctx.beginPath();ctx.arc(p.x+Math.cos(p.a+.45)*9,p.y+Math.sin(p.a+.45)*9,3,0,7);ctx.arc(p.x+Math.cos(p.a-.45)*9,p.y+Math.sin(p.a-.45)*9,3,0,7);ctx.fill()}
addEventListener('beforeunload',()=>{if(me)navigator.sendBeacon('/api/leave',JSON.stringify({playerId:me}))});
</script></body></html>
